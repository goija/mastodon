<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX: Modulo 20 Akoestische Matrix</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow-x: hidden;
        }
        
        /* Repository Navigatie Balk - Gekleurde Knoppen */
        .repo-nav {
            width: 100%;
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .repo-nav a {
            display: inline-block;
            text-decoration: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 6px;
            color: white;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            transition: all 0.15s ease-in-out;
            cursor: pointer;
        }
        
        .repo-nav a:hover {
            transform: translateY(-2px);
            filter: brightness(1.15);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .repo-nav a:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(0,0,0,0);
        }

        /* Automatische Kleurverdeling voor Repo Knoppen */
        .repo-nav a:nth-child(6n+1) { background-color: #d73a49; } /* Rood */
        .repo-nav a:nth-child(6n+2) { background-color: #28a745; } /* Groen */
        .repo-nav a:nth-child(6n+3) { background-color: #0366d6; } /* Blauw */
        .repo-nav a:nth-child(6n+4) { background-color: #ffd33d; color: #24292e; } /* Geel (Donkere tekst) */
        .repo-nav a:nth-child(6n+5) { background-color: #6f42c1; } /* Paars */
        .repo-nav a:nth-child(6n+6) { background-color: #ea4aaa; } /* Roze */

        /* Specifieke Highlight voor index.html */
        .repo-nav a[href="/index.html"] {
            border: 2px solid #ffffff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        h1 {
            color: #58a6ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-top: 30px;
        }

        /* Twee Abacussen Layout */
        .dual-abacus-layout {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Individuele Abacus Container */
        .abacus {
            flex: 1;
            background-color: #161b22;
            border: 2px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .abacus-header {
            color: #8b949e;
            text-transform: uppercase;
            border-bottom: 1px dashed #30363d;
            padding-bottom: 10px;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Canvas & UI Stijlen (Linker Abacus) */
        .visual-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            background-color: #000;
            border: 1px solid #58a6ff;
            border-radius: 4px;
            width: 100%;
            max-width: 350px;
        }
        input[type=range] {
            width: 100%;
            max-width: 350px;
            margin: 20px 0;
            cursor: pointer;
        }
        #audioBtn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            font-family: inherit;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 0 #185c25;
        }
        #audioBtn:hover {
            background-color: #2ea043;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #185c25;
        }
        #audioBtn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 #185c25;
        }
        #audioBtn:disabled {
            background-color: #30363d;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
            color: #8b949e;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 5px;
            font-size: 15px;
        }
        .highlight { color: #7ee787; font-weight: bold; }
        .prime-highlight { color: #ff7b72; font-weight: bold; }

        /* Documentatie Stijlen (Rechter Abacus) */
        .readme-content {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            overflow-y: auto;
            max-height: 700px;
            padding-right: 10px;
        }
        /* Custom Scrollbar */
        .readme-content::-webkit-scrollbar { width: 8px; }
        .readme-content::-webkit-scrollbar-track { background: #0d1117; }
        .readme-content::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        
        .readme-content h2, .readme-content h3 {
            color: #58a6ff;
            border-bottom: 1px solid #21262d;
            padding-bottom: 0.3em;
            margin-top: 0;
        }
        .readme-content h3 {
            margin-top: 1.5em;
            color: #c9d1d9;
            font-size: 1.2em;
        }
        .readme-content code {
            background-color: #0d1117;
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 85%;
