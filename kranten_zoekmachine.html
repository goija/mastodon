            text: "Met het overlijden van Cees Geel verliest Nederland een van zijn meest karakteristieke acteurs. Geel brak bij het grote publiek door met zijn ontroerende en krachtige rollen in zowel speelfilms als dramaseries. Hij stond bekend als het archetype 'ruwe bolster, blanke pit'.\n\nCollega's en regisseurs roemen zijn oprechte spel, zijn unieke stemgeluid en zijn vermogen om zware thema's met humor en menselijkheid te benaderen. Geel werd 61 jaar.",
            keywords: ["cees geel", "acteur", "overleden", "in memoriam", "film", "televisie", "cultuur"]
        }
    ];

    const searchInput = document.getElementById('search-input');
    const categorySelect = document.getElementById('category-select');
    const articlesContainer = document.getElementById('articles-container');
    const resultStats = document.getElementById('result-stats');

    // Functie om tekst te highlighten op basis van zoekterm
    function highlightText(text, query) {
        if (!query) return text;
        const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<span class="highlight">$1</span>');
    }

    // Functie om de artikelen te renderen
    function renderArticles() {
        const query = searchInput.value.toLowerCase().trim();
        const selectedCategory = categorySelect.value;

        // Filter de database
        const filteredArticles = articlesDatabase.filter(article => {
            const matchesCategory = selectedCategory === 'alle' || article.category === selectedCategory;
            
            const searchText = `${article.title} ${article.subtitle} ${article.summary} ${article.text} ${article.keywords.join(' ')}`.toLowerCase();
            const matchesQuery = searchText.includes(query);

            return matchesCategory && matchesQuery;
        });

        // Update statistieken
        resultStats.textContent = `Toont ${filteredArticles.length} van de ${articlesDatabase.length} artikelen`;

        // Maak container leeg
        articlesContainer.innerHTML = '';

        if (filteredArticles.length === 0) {
            articlesContainer.innerHTML = `
                <div class="article-card" style="text-align: center; color: var(--meta-color);">
                    <h3>Geen artikelen gevonden</h3>
                    <p>Probeer een andere zoekterm of selecteer 'Alle rubrieken'.</p>
                </div>
            `;
            return;
        }

        // Genereer HTML voor elk artikel
        filteredArticles.forEach(article => {
            const card = document.createElement('article');
            card.className = 'article-card';
            
            card.innerHTML = `
                <div class="article-meta">
                    <div>
                        <span class="category-tag">${article.category}</span>
                        <span style="margin-left: 8px;">${article.page}</span>
                    </div>
                    <div>${article.date} • ${article.author}</div>
                </div>
                <h3 class="article-title">${highlightText(article.title, query)}</h3>
                <div class="article-subtitle">${highlightText(article.subtitle, query)}</div>
                <div class="article-summary">${highlightText(article.summary, query)}</div>
                <div class="article-text" id="text-${article.id}">${highlightText(article.text, query)}</div>
                <button class="read-more-btn" onclick="toggleReadMore(${article.id}, this)">Lees volledig artikel ↓</button>
            `;

            articlesContainer.appendChild(card);
        });
    }

    // Functie om volledige artikeltekst in/uit te klappen
    function toggleReadMore(id, btn) {
        const textElement = document.getElementById(`text-${id}`);
        if (textElement.style.display === 'block') {
            textElement.style.display = 'none';
            btn.innerHTML = 'Lees volledig artikel ↓';
        } else {
            textElement.style.display = 'block';
            btn.innerHTML = 'Verberg artikel ↑';
        }
    }

    // Event listeners voor live zoeken en filteren
    searchInput.addEventListener('input', renderArticles);
    categorySelect.addEventListener('change', renderArticles);

    // Initiële weergave
    renderArticles();
</script>

</body>
</html>
