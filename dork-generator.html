<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Dork Generator</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 0.25rem;
            font-size: 0.875rem;
        }
        input, select {
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .result-box {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }
        .result-text {
            font-family: monospace;
            font-size: 1.125rem;
            word-break: break-all;
            color: #0f172a;
            min-height: 1.5rem;
        }
        .actions {
            display: flex;
            gap: 1rem;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            flex: 1;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button.secondary {
            background-color: #64748b;
        }
        button.secondary:hover {
            background-color: #475569;
        }
        .presets {
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
        .preset-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem;
            font-size: 0.875rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            flex: none;
        }
        .preset-btn:hover {
            background: #f1f5f9;
            color: var(--text);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Google Dork Generator</h1>
    
    <div class="grid">
        <div class="form-group full-width">
            <label for="allWords">Standaard zoekwoorden (bevat alle woorden)</label>
            <input type="text" id="allWords" placeholder="bijv. middeleeuwen letterkunde">
        </div>

        <div class="form-group">
            <label for="exactPhrase">Exacte zinsnede ("...")</label>
            <input type="text" id="exactPhrase" placeholder="bijv. Willem van Hildegaersberch">
        </div>

        <div class="form-group">
            <label for="excludeWords">Uitsluiten (-...)</label>
            <input type="text" id="excludeWords" placeholder="bijv. wikipedia samenvatting">
        </div>

        <div class="form-group">
            <label for="site">Specifieke website of domein (site:)</label>
            <input type="text" id="site" placeholder="bijv. dbnl.org of .edu">
        </div>

        <div class="form-group">
            <label for="filetype">Bestandstype (filetype:)</label>
            <select id="filetype">
                <option value="">Alle bestandstypen</option>
                <option value="pdf">PDF (.pdf)</option>
                <option value="doc">Word (.doc, .docx)</option>
                <option value="xls">Excel (.xls, .xlsx)</option>
                <option value="txt">Tekstbestand (.txt)</option>
                <option value="xml">XML (.xml)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="intitle">Woorden in de titel (intitle:)</label>
            <input type="text" id="intitle" placeholder="bijv. geschiedenis">
        </div>

        <div class="form-group">
            <label for="inurl">Woorden in de URL (inurl:)</label>
            <input type="text" id="inurl" placeholder="bijv. auteur of download">
        </div>
    </div>

    <label>Gegenereerde Google Dork:</label>
    <div class="result-box">
        <div class="result-text" id="output">Vul de velden hierboven in...</div>
    </div>

    <div class="actions">
        <button onclick="searchGoogle()">Zoek in Google</button>
        <button class="secondary" onclick="copyDork()">Kopiëer Dork</button>
        <button class="secondary" onclick="clearFields()">Wissen</button>
    </div>

    <div class="presets">
        <label>Snelle Presets:</label><br>
        <button class="preset-btn" onclick="applyPreset('dbnl')">Zoek PDF boeken op DBNL</button>
        <button class="preset-btn" onclick="applyPreset('openDir')">Open Directories (Bestanden)</button>
        <button class="preset-btn" onclick="applyPreset('govDocs')">Overheidsdocumenten</button>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('input, select');
    const output = document.getElementById('output');

    function generateDork() {
        let parts = [];
        
        const allWords = document.getElementById('allWords').value.trim();
        const exactPhrase = document.getElementById('exactPhrase').value.trim();
        const excludeWords = document.getElementById('excludeWords').value.trim();
        const site = document.getElementById('site').value.trim();
        const filetype = document.getElementById('filetype').value;
        const intitle = document.getElementById('intitle').value.trim();
        const inurl = document.getElementById('inurl').value.trim();

        if (allWords) parts.push(allWords);
        if (exactPhrase) parts.push(`"${exactPhrase}"`);
        if (excludeWords) {
            excludeWords.split(' ').forEach(word => {
                if(word) parts.push(`-${word}`);
            });
        }
        if (site) parts.push(`site:${site}`);
        if (filetype) parts.push(`filetype:${filetype}`);
        if (intitle) parts.push(`intitle:"${intitle}"`);
        if (inurl) parts.push(`inurl:${inurl}`);

        const dork = parts.join(' ');
        output.textContent = dork || 'Vul de velden hierboven in...';
        return dork;
    }

    inputs.forEach(input => {
        input.addEventListener('input', generateDork);
    });

    function searchGoogle() {
        const dork = generateDork();
        if (dork && dork !== 'Vul de velden hierboven in...') {
            const url = `https://www.google.com/search?q=${encodeURIComponent(dork)}`;
            window.open(url, '_blank');
        }
    }

    function copyDork() {
        const dork = generateDork();
        if (dork && dork !== 'Vul de velden hierboven in...') {
            navigator.clipboard.writeText(dork);
            alert('Dork gekopieerd naar klembord!');
        }
    }

    function clearFields() {
        inputs.forEach(input => input.value = '');
        generateDork();
    }

    function applyPreset(type) {
        clearFields();
        if (type === 'dbnl') {
            document.getElementById('site').value = 'dbnl.org';
            document.getElementById('filetype').value = 'pdf';
            document.getElementById('allWords').value = 'middeleeuwen';
        } else if (type === 'openDir') {
            document.getElementById('intitle').value = 'index.of';
            document.getElementById('exactPhrase').value = 'parent directory';
        } else if (type === 'govDocs') {
            document.getElementById('site').value = '.overheid.nl';
            document.getElementById('filetype').value = 'pdf';
            document.getElementById('intitle').value = 'rapport';
        }
        generateDork();
    }
</script>

</body>
</html>
